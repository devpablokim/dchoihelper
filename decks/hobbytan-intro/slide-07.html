<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<section class="slide">
  <div class="bg">
    <div class="hairgrid" style="opacity:.4;"></div>
    <div class="glow" style="left:64%; top:30%; width:760px; height:760px; background:#4C63E6; opacity:.12;"></div>
    <div class="bg-grain"></div>
  </div>

  <div class="deck-brand"><div class="mark"></div><div class="wm">HOBBYTAN <b>AI</b></div></div>
  <div class="deck-meta">RETURN · 2026.07</div>
  <div class="deck-author">hobbytan.com</div>
  <div class="deck-page"><b>07</b> / 10</div>

  <div class="frame">
    <div class="spacer"></div>
    <div class="eyebrow">RETURN</div>
    <div class="gap-m"></div>
    <h1 class="action-title">투자는 열두 배가 되어 돌아옵니다.</h1>
    <div class="gap-l"></div>
    <div class="stat-row" style="gap:120px;">
      <div class="stat">
        <div class="k">평균 ROI</div>
        <div class="v">12<small>배</small></div>
        <div class="c">수료 기업이 회수한 평균 투자 대비 효과</div>
      </div>
      <div class="stat">
        <div class="k">재구매율</div>
        <div class="v">80<small>%</small></div>
        <div class="c">한 번 경험한 기업 10곳 중 8곳이 다시 찾습니다</div>
      </div>
    </div>
    <div class="spacer"></div>
    <div class="tail">효과가 없으면 재구매도 없습니다 — <b>재구매율이 곧 품질 지표</b>입니다.</div>
  </div>
</section>
</body>
</html>
